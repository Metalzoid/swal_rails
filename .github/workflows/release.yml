name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(ruby -e 'load "./lib/swal_rails/version.rb"; puts SwalRails::VERSION')"
          tag="v${version}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists — nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag.outputs.create_tag == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.tag }}" -m "Release ${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Build gem
        if: steps.tag.outputs.should_release == 'true'
        run: gem build swal_rails.gemspec

      - name: Create GitHub Release
        if: steps.tag.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "swal_rails ${{ steps.tag.outputs.tag }}" \
            --generate-notes \
            swal_rails-*.gem

      - name: Publish to GitHub Packages
        if: steps.tag.outputs.should_release == 'true'
        env:
          GEM_HOST_API_KEY: "Bearer ${{ secrets.GITHUB_TOKEN }}"
        run: |
          gem push --key github \
                   --host https://rubygems.pkg.github.com/${{ github.repository_owner }} \
                   swal_rails-*.gem
